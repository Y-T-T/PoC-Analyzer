name: Update Blacklist

on:
  schedule:
    - cron: '0 0 * * *' # Executes every day at midnight (UTC)
  workflow_dispatch: # Allows manual triggering from the GitHub Actions page

jobs:
  update-blacklist:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the workflow to push code back to the repository

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 1 # Fetch only the latest commit to reduce checkout time

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run update blacklist script
      run: python update_blacklist.py

    - name: Commit and push changes
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git add rules/data/blacklist.txt

        # Simplified check for changes
        if git diff --staged --quiet; then
          echo "No changes detected. Skipping commit."
        else
          git commit -m "chore: auto-update blacklist.txt"
          git push
        fi
